services:
  database:
    image: mysql:8.0
    container_name: automoviles_test_db
    restart: always
    env_file: [".env.test"]
    networks:
      - web-app-automoviles-test
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysqldata:
    driver: local

networks:
  web-app-automoviles-test:
    external: true