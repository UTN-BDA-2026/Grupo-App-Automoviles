services:
  vector-db:
    image: chromadb/chroma:1.5.2
    container_name: chromadb_service
    restart: always
    environment: [".env"]
    networks:
      - web-app-automoviles
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chromadata:
    driver: local

networks:
  web-app-automoviles:
    external: true